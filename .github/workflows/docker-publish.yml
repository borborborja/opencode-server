name: build-and-push
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * 1'   # lunes 04:00 UTC → refresca opencode/base horneados
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: |
            ghcr.io/borborborja/opencode-server:latest
            ghcr.io/borborborja/opencode-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
